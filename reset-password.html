<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Enter New Password</title>
</head>
<body class="bg-white p-6 max-w-md mx-auto">
      <header class="flex items-center mb-6">
      <a href="LoginFilled.html" class="inline-flex items-center gap-2 text-black" aria-label="Go back">
        <svg class="w-[20px] h-[20px]" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
        </svg>
        <span class="text-[16px] font-medium">Back</span>
      </a>
    </header>
  
  <h1 class="text-xl font-bold text-center mb-8">Enter New Password</h1>
  
  <label class="block text-sm font-medium mb-1">New Password</label>
  <input type="password" id="newPassword" class="w-full border border-gray-300 rounded-lg p-3 mb-4">
  
  <label class="block text-sm font-medium mb-1">Confirm password</label>
  <input type="password" id="confirmPassword" class="w-full border border-gray-300 rounded-lg p-3 mb-2">
  
  <p id="errorMsg" class="text-red-500 text-sm mb-4 hidden">Passwords do not match</p>
  
  <a href="LoginFilled.html">
  <button id="confirmBtn" disabled class="w-full bg-[#E8622A] cursor-pointer text-white py-3 rounded-lg opacity-50 cursor-not-allowed">
    Confirm Password
  </button>
  </a>

  
  <script>
  document.addEventListener('DOMContentLoaded', () => {
    const newPass = document.getElementById('newPassword');
    const confirmPass = document.getElementById('confirmPassword');
    const confirmBtn = document.getElementById('confirmBtn');
    const errorMsg = document.getElementById('errorMsg');

    function validate() {
      const pass1 = newPass.value;
      const pass2 = confirmPass.value;
      const valid = pass1.length >= 6 && pass2.length >= 6 && pass1 === pass2;
      
      confirmBtn.disabled = !valid;
      confirmBtn.classList.toggle('opacity-50', !valid);
      confirmBtn.classList.toggle('bg-orange-500', valid);
      errorMsg.classList.toggle('hidden', pass1 === pass2 || pass2 === '');
    }

    newPass.oninput = confirmPass.oninput = validate;

   confirmBtn.onclick = (e) => {
  e.preventDefault();
  const role = new URLSearchParams(window.location.search).get('role');
  alert('Password changed successfully!');
  
  // Go back to login page
  window.location.href = `LoginFilled.html?role=${role}`;
    }
  });
  </script>
</body>
</html>
