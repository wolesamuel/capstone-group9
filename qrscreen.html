<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Your Ticket - Africa AI Summit</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<main class="w-full max-w-[390px] mx-auto min-h-screen pt-12 px-5 pb-8">

<!-- Header -->
<header class="flex items-center justify-between mb-5">
	<a href="paymentsuccess.html">
		<svg class="w-6 h-6 text-black" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
			<path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
		</svg>
	</a>
	<button type="button" aria-label="Share ticket">
		<svg class="w-6 h-6 text-black" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
			<path stroke-linecap="round" stroke-linejoin="round" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/>
		</svg>
	</button>
</header>

<!-- Ticket Card -->
<section class="bg-[#FAF0EE] px-8 rounded-3xl p-5 mb-5">

	<!-- Event Info -->
	<div class="mb-5 pl-3 pb-6">
		<p class="text-sm font-medium text-black mb-0.5">June 12</p>
		<p class="text-sm text-gray-600 mb-3">9:00am</p>
		<div class="flex items-center gap-3">
			<img src="Frame 93.png" class="w-24 h-16 rounded-lg object-cover">
			<h1 class="text-base font-semibold text-black">Africa AI Summit</h1>
		</div>
	</div>

	<!-- QR Code with Logo Overlay -->
	<div class="flex justify-center mb-4">
		<div class="relative w-64 h-64 bg-white shadow-sm">
			<!-- QR Code -->
			<img
				src="Gemini_Generated_Image_gx29lxgx29lxgx29 1.png"
				alt="Ticket QR Code"
				class="w-full h-full"
			>

			<!-- Logo Overlay - Centered -->
			<div class="absolute inset-0 flex items-center justify-center">
				<div class="w-16 h-16 flex items-center justify-center p-2">
					<!-- Replace this SVG with your ScanPass logo SVG/PNG -->
					<img src="Logo.png" class="object-cover h-32 text-[#E8622A]" viewBox="0 0 32 32" fill="currentColor">
						<path d="M4 4h10v10H4zM18 4h10v10H18zM4 18h10v10H4zM18 18h4v4h-4zM26 18h2v2h-2zM22 22h6v6h-6z"/>
					</img>
				</div>
			</div>
		</div>
	</div>

	<!-- Ticket Info -->
	<div class="text-center mb-5">
		<p class="text-sm text-gray-700 mb-1">
			Your Pass to the experience • Ticket 1 of 1
		</p>
		<p class="text-sm text-gray-700">
			General Admission • Check-in time: Anytime
		</p>
	</div>

	<!-- Add to Gallery Button -->
	<button type="button" class="w-full bg-black text-white font-semibold py-3.5 rounded-full text-base flex items-center justify-center gap-2 mb-6">
		<img src="ep_ticket.png" class="w-5 h-5 text-[#E8622A]">
		Add to Ticket Gallery
	</button>

	<!-- Action List -->
	<div class="space-y-4">
		<button class="w-full flex items-center justify-between group">
			<div class="flex items-center gap-3">
				<img src="Frame 291.png" class="w-6 h-6 text-black">
				<span class="text-base text-black">Event Details</span>
			</div>
			<svg class="w-5 h-5 group-hover:text-black transition" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
				<path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
			</svg>
		</button>

		<button class="w-full flex items-center justify-between group">
			<div class="flex items-center gap-3">
				<img src="Frame 291 (2).png" class="w-6 h-6 text-black" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
				<span class="text-base text-black">Order Details</span>
			</div>
			<svg class="w-5 h-5 group-hover:text-black transition" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
				<path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
			</svg>
		</button>

		<button class="w-full flex items-center justify-between group">
			<div class="flex items-center gap-3">
				<img src="Frame 291 (1).png" class="w-6 h-6 text-black">
				<span class="text-base text-black">Save to Phone</span>
			</div>
		</button>
	</div>

	<div class="h-px bg-gray-200 my-5"></div>

	<!-- Organizer -->
	<div>
		<p class="text-sm font-semibold text-black mb-3">Organized by</p>
		<div class="flex items-center justify-between">
			<div class="flex items-center gap-3">
				<div class="w-10 h-10 bg-white rounded-full flex items-center justify-center">
					<img src="Vector (4).png" class="w-5 h-5">
				</div>
				<div>
					<p class="text-sm font-medium text-black">By Impact Hub Center</p>
					<p class="text-xs text-gray-500">1k followers</p>
				</div>
			</div>
			<button class="border px-5 py-1.5 border-black text-sm font-medium text-black rounded-lg hover:bg-gray-50">
				Follow
			</button>
		</div>
	</div>
</section>
</main>
</body>
</html>
