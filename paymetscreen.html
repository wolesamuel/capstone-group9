<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Checkout - ScanPass</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white antialiased">
<main class="w-full max-w-[390px] mx-auto min-h-screen pt-12 px-5 pb-8">

<!-- 1. Header -->
<header class="flex items-center mb-5">
	<a href="proceedtopayment.html" class="inline-flex items-center gap-2 text-black" aria-label="Go back">
		<svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" aria-hidden="true">
			<path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
		</svg>
		<span class="text-base font-medium">Checkout</span>
	</a>
</header>

<!-- 2. Order Summary Title -->
<section class="flex items-center justify-between mb-3">
	<h1 class="text-2xl font-bold text-black">Order Summary</h1>
	<span class="px-2.5 py-0.5 bg-[#E8622A]/10 text-[#E8622A] text-xs font-medium rounded-full">1 item</span>
</section>

<!-- 3. Event Card -->
<section class="border border-[#E8622A] rounded-xl p-3 mb-3">
	<div class="flex gap-3">
		<img src="Frame 93.png" class="w-16 h-16 rounded-lg">
		<div class="flex-1 min-w-0">
			<div class="flex items-start justify-between">
				<div>
					<h2 class="text-base font-semibold text-black leading-tight">Africa AI Summit</h2>
					<div class="flex items-center gap-2 text-sm text-gray-600 mt-0.5">
						<span>Jun 12</span>
						<span>• 9:00AM</span>
					</div>
					<div class="flex items-center gap-1.5 text-sm text-gray-600 mt-1">
						<svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
							<path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0zM15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
						</svg>
						<span>Civic Center, Lagos</span>
					</div>
				</div>
				<div class="flex items-center flex-col gap-2">
					<p class="text-base font-semibold text-[#E8622A]">₦20,000</p>
					<svg class="w-4 h-4 -mr-12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
						<path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
					</svg>
				</div>
			</div>
		</div>
	</div>
</section>

<!-- 4. Price Breakdown -->
<section class="border  border-gray-100 rounded-xl p-4 mb-6 space-y-2.5">
	<div class="flex justify-between text-sm">
		<span class="text-gray-600">Subtotal</span>
		<span class="text-[#E8622A] font-medium">₦20,000</span>
	</div>
	<div class="flex justify-between text-sm">
		<span class="text-gray-600">Service Fee</span>
		<span class="text-[#E8622A] font-medium">₦50</span>
	</div>
	<div class="h-px bg-gray-200 my-1"></div>
	<div class="flex justify-between">
		<span class="font-semibold text-black">Total</span>
		<span class="font-semibold text-[#E8622A]">₦20,050</span>
	</div>
</section>

<!-- 5. Payment Method -->
<section>
	<h2 class="text-2xl font-bold mb-1">Payment Method</h2>
	<p class="text-sm text-gray-500 mb-5">All transactions are secure and encrypted.</p>

	<form id="paymentForm" action="paymentsuccess.html" method="get" class="space-y-4">
		<!-- Cardholder Name -->
		<div>
			<label for="cardName" class="block text-sm font-semibold mb-2">Cardholder Name</label>
			<input
				type="text"
				id="cardName"
				placeholder="Jonathan Wick"
				class="w-full px-4 py-3.5 border-2 border-gray-200 rounded-lg text-base text-black placeholder:text-gray-400 focus:outline-none focus:border-[#E8622A] focus:ring-1 focus:ring-[#E8622A] transition"
				required
			>
		</div>

		<!-- Card Number -->
		<div>
			<label for="cardNumber" class="block text-sm font-semibold text-black mb-2">Credit Card Number</label>
			<input
				type="text"
				id="cardNumber"
				placeholder="0000 0000 0000 0000"
				maxlength="19"
				class="w-full px-4 py-3.5 border-2 border-gray-200 rounded-lg text-base text-black placeholder:text-gray-400 focus:outline-none focus:border-[#E8622A] focus:ring-1 focus:ring-[#E8622A] transition"
				required
			>
		</div>

		<!-- Expiry + CVV -->
		<div class="grid grid-cols-2 gap-3">
			<div>
				<label for="expiry" class="block text-sm font-semibold text-black mb-2">Expiry Date</label>
				<input
					type="text"
					id="expiry"
					placeholder="MM/YY"
					maxlength="5"
					class="w-full px-4 py-3.5 border-2 border-gray-200 rounded-lg text-base text-black placeholder:text-gray-400 focus:outline-none focus:border-[#E8622A] focus:ring-1 focus:ring-[#E8622A] transition"
					required
				>
			</div>
			<div>
				<label for="cvv" class="block text-sm font-semibold text-black mb-2">CVV</label>
				<input
					type="password"
					id="cvv"
					placeholder="•••"
					maxlength="4"
					class="w-full px-4 py-3.5 border-2 border-gray-200 rounded-lg text-base text-black placeholder:text-gray-400 focus:outline-none focus:border-[#E8622A] focus:ring-1 focus:ring-[#E8622A] transition"
					required
				>
			</div>
		</div>

		<!-- Pay Button -->
		 <a href="paymentsuccess.html">
		<button
			type="submit"
			class="w-full bg-[#E8622A] hover:bg-[#D4551F] active:bg-[#C24D1C] text-white font-semibold py-4 rounded-xl text-base transition-colors mt-2">
			Pay Now
		</button>
		</a>
	</form>
</section>
</body>
</html>
