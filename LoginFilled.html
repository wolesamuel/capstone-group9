<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white min-h-screen flex justify-center font-sans">
  <div class="w-full max-w-sm px-6 py-8 flex-col min-h-screen">
    <div class="mb-6">
      <h1 class="text-3xl font-bold text-black mb-3">Welcome back!</h1>
      <p class="text-gray-600 text-base leading-relaxed">
        Log in with your invite link or credentials to access staff tools.
      </p>
    </div>

    <!-- Added id for JS -->
    <form id="staffLoginForm" class="space-y-5" action="Attendeeonboarding.html">
      <div>
        <label class="block text-xl font-semibold mb-2">Email Address</label>
        <div class="relative">
          <svg class="absolute left-3 top-3.5 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
          </svg>
          <input type="email" id="email" value="adewalefissy@gmail.com" 
            class="w-full border border-gray-300 rounded-lg pl-10 pr-4 py-3 focus:outline-none focus:border-[#E8622A] focus:ring-1 focus:ring-[#E8622A]">
        </div>
      </div>
      
      <div>
        <label class="block text-xl font-semibold mb-2">Password</label>
        <div class="relative">
          <svg class="absolute left-3 top-3.5 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
          <input id="password" type="password" value="********" 
            class="w-full border border-gray-300 rounded-lg pl-10 pr-10 py-3 focus:outline-none focus:border-[#E8622A] focus:ring-1 focus:ring-[#E8622A]">
          <svg id="togglePassword" class="absolute right-3 top-3.5 w-5 h-5 text-gray-400 cursor-pointer" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </div>
      </div>

      <div class="flex items-center justify-between text-sm">
        <label class="flex items-center gap-2 text-gray-600">
          <input type="checkbox" class="rounded border-gray-300 text-[#E8622A] focus:ring-[#E8622A]">
          Remember Me
        </label>
        <a href="forgotpassword.html?role=staff" class="text-blue-600 font-medium">Forgot Password?</a>
      </div>

      <!-- Changed to submit + added id -->
      <button type="submit" class="w-full bg-[#E8622A] text-white font-semibold py-4 rounded-xl">
        Log in
      </button>
    </form>

    <div class="mt-8 text-center">
      <p class="text-xs text-gray-400 leading-relaxed">
        By creating an account you agree to ScanPass' 
        <p class="text-[#E8622A]">Terms of Service</p> and 
        <p class="text-[#E8622A]">Privacy Policy</p>
      </p>
    </div>
  </div>

 
</body>
</html>
