<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Verify Code</title>
</head>
<body class="bg-white p-6 max-w-sm mx-auto">

  <h1 class="text-xl font-bold text-center mb-2">Verify Code</h1>
  <p class="text-gray-500 text-sm text-center mb-8">Enter the 4-digit code sent to your email</p>

  <!-- 4 OTP boxes -->
  <div class="flex justify-center gap-3 mb-6">
    <input type="text" maxlength="1" class="otp-box w-14 h-14 border-2 border-gray-300 rounded-lg text-center text-2xl font-bold focus:border-orange-500 focus:outline-none">
    <input type="text" maxlength="1" class="otp-box w-14 h-14 border-2 border-gray-300 rounded-lg text-center text-2xl font-bold focus:border-orange-500 focus:outline-none">
    <input type="text" maxlength="1" class="otp-box w-14 h-14 border-2 border-gray-300 rounded-lg text-center text-2xl font-bold focus:border-orange-500 focus:outline-none">
    <input type="text" maxlength="1" class="otp-box w-14 h-14 border-2 border-gray-300 rounded-lg text-center text-2xl font-bold focus:border-orange-500 focus:outline-none">
  </div>

  <button id="continueBtn" disabled class="w-full bg-orange-400 text-white py-3 rounded-lg opacity-50 cursor-not-allowed font-medium">
    Continue
  </button>

  <p class="text-center text-sm text-gray-500 mt-4">Didn’t get the code? <span class="text-orange-500">Resend</span></p>

  <script>
  document.addEventListener('DOMContentLoaded', () => {
    const inputs = document.querySelectorAll('.otp-box');
    const btn = document.getElementById('continueBtn');

    inputs.forEach((box, i) => {
      box.oninput = () => {

        box.value = box.value.replace(/[^0-9]/g, '');

    
        if(box.value && i < inputs.length - 1) {
          inputs[i + 1].focus();
        }

        const allFilled = Array.from(inputs).every(b => b.value.length === 1);
        btn.disabled =!allFilled;
        btn.classList.toggle('opacity-50',!allFilled);
        btn.classList.toggle('bg-orange-500', allFilled);
        btn.classList.toggle('cursor-not-allowed',!allFilled);
      }

      // Backspace to go back
      box.onkeydown = (e) => {
        if(e.key === 'Backspace' &&!box.value && i > 0) {
          inputs[i - 1].focus();
        }
      }
    });

    btn.onclick = (e) => {
      e.preventDefault();
      const code = Array.from(inputs).map(b => b.value).join('');
      const role = new URLSearchParams(window.location.search).get('role');

      // Go to reset password page with the role + code
      window.location.href = `reset-password.html?role=${role}&code=${code}`;
    }

    // Auto focus first box
    inputs[0].focus();
  });
  </script>
</body>
</html>
