<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Invite Link - ScanPass</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<div class="w-full max-w-[390px] mx-auto min-h-screen px-5 pt-11 pb-8 flex-col">

<!-- Header -->
<header class="pt-1 h-14 flex items-center justify-center relative mb-6">
<a href="invite-link.html" class="absolute left-0 w-8 h-8 flex items-center justify-center -ml-2 active:bg-gray-100 rounded-full transition" aria-label="Back">
<img src="material-symbols_arrow-back.png" class="w-6 h-6">
</a>
<h1 class="text-lg font-semibold text-black">Invite Link</h1>
</header>

<!-- Content -->
<div class="flex-1 flex-col items-center text-center">

<!-- Icon -->
<div class="ml-32 w-16 h-16 bg-[#E8622A] items-center justify-center rounded-2xl flex items-center justify-center mb-5">
<img src="Frame 10.png" class="w-12 h-12">
</div>

<!-- Title + Details -->
<h2 class="text-xl font-bold text-black mb-2">You’ve been Invited!</h2>
<p class="text- text-black font-medium mb-1">Africa AI Summit 2026 - Gate 1 staff</p>
<p class="text- text-gray-600 mb-8 leading-relaxed px-4">
Complete setup to begin scanning and validating tickets.
</p>

<!-- Role Card -->
<div class="w-full border-2 border-[#E8622A] rounded-xl p-4 mb-6">
<p class="text- font-semibold text-black mb-1">Role:</p>
<p class="text-xl font-bold text-[#E8622A]">Gate 1 Scanner</p>
</div>

<!-- Buttons -->
<div class="w-full space-y-3 mt-auto">
<a
    href="staff-setup.html"
    class="w-full h-12 bg-[#E8622A] rounded-xl flex items-center justify-center text-white font-semibold text- active:scale- active:bg-[#D95A24] transition"
>
    Continue
</a>

<a
    href="contact-support.html"
    class="w-full h-12 bg-white border-2 border-[#E8622A] rounded-xl flex items-center justify-center text-[#E8622A] font-semibold text- active:bg-orange-50 transition"
>
    Contact supervisor
</a>

<p class="text-xs text-center text-gray-400 mt-2">
    Single use - Expires in 12hrs
</p>
</div>
</div>
</div>
</body>
</html>
