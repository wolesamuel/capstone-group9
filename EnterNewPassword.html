<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScanPass - Reset Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white min-h-screen flex justify-center font-sans">
  <div class="w-full max-w-sm px-6 py-8 flex-col min-h-screen">

    <!-- Back button + Heading -->
<div class="flex items-center mb-8">
  <a href="forgotpassword.html">
    <div>
    <svg class="w-6 h-6 text-black" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path d="M15 19l-7-7 7-7"/>
    </svg>
    </div>
  </a>
  <h1 class="text-xl font-bold text-black flex-1 text-center -ml-10">Enter New Password</h1>
</div>

    <!-- Form -->
    <form class="space-y-5">
      <div>
        <label class="block text-black font-semibold mb-2">New Password</label>
        <div class="relative">
          <input id="newPassword" type="password" 
            class="w-full border border-gray-300 rounded-lg px-4 py-3 pr-10 focus:outline-none focus:border-[#E8622A] focus:ring-1 focus:ring-[#E8622A]">
          <svg id="toggleNew" class="absolute right-3 top-3.5 w-5 h-5 text-gray-400 cursor-pointer" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </div>
      </div>

      <!-- Confirm Password -->
      <div>
        <label class="block text-black font-semibold mb-2">Confirm password</label>
        <div class="relative">
          <input id="confirmPassword" type="password" 
            class="w-full border border-gray-300 rounded-lg px-4 py-3 pr-10 focus:outline-none focus:border-[#E8622A] focus:ring-1 focus:ring-[#E8622A]">
          <svg id="toggleConfirm" class="absolute right-3 top-3.5 w-5 h-5 text-gray-400 cursor-pointer" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </div>
      </div>

      <!-- Confirm Button -->
      <button type="submit" class="w-full bg-[#E8622A] hover:bg-[#d15826] text-white font-semibold py-4 rounded-xl transition mt-2">
        Confirm Password
      </button>
    </form>
</body>
</html>
