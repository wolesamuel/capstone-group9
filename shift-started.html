<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Shift Started - ScanPass</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white antialiased">
<div class="w-full max-w-[390px] mx-auto min-h-screen flex-col pb-20">

<!-- Header -->
<header class="pt-11 px-5 h-14 flex items-center relative mb-8">
  <a href="alert.html" class="absolute left-5 w-8 h-8 flex items-center justify-center -ml-2 active:bg-gray-100 rounded-full transition" aria-label="Back">
    <img src="material-symbols_arrow-back.png" class="w-6 h-6">
  </a>
  <h1 class="text-lg font-bold text mx-auto">Shift Started</h1>
</header>

<!-- Content -->
<div class="flex-1 px-5">

  <!-- Green Calendar Check Icon -->
  <div class="flex justify-center mb-6">
    <div class="w-20 h-20 rounded-full flex items-center justify-center">
      <img src="Frame 650.png" class="w-18 h-18">
    </div>
  </div>

  <!-- Title + Subtitle -->
  <h2 class="text-2xl font-bold text-black text-center mb-2">You are now on duty.</h2>
  <p class="text-base text-gray-600 text-center mb-8">Your scanning session has started successfully.</p>

  <!-- Details Card -->
  <div class="bg-white border-gray-200 rounded-xl p-5 space-y-3 mb-8">
    <div class="flex justify-between items-center">
      <span>Gate</span>
      <span class="font-semibold">Gate 2</span>
    </div>
    <div class="flex justify-between items-center">
      <span>Start Time</span>
      <span class="font-semibold">12:00 PM</span>
    </div>
    <div class="flex justify-between items-center">
      <span>Supervisor</span>
      <span class="font-semibold">Sarah Johnson</span>
    </div>
    <div class="flex justify-between items-center">
      <span>Date</span>
      <span class="font-semibold">May 27, 2026</span>
    </div>
  </div>

  <!-- Start Scanning Button -->
  <a href="scanner.html" class="w-full bg-[#E8622A] text-white font-semibold text-base py-3 rounded-lg flex items-center justify-center gap-2 active:bg-[#d55a26] transition">
    <img src="ri_play-fill.png" class="w-5 h-5">
    Start Scanning
  </a>
</div>


<!-- Bottom Nav -->
<nav class="fixed bg-orange-50 shadow-3xl bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[390px] bg-white border-t border-gray-200 px-6 py-2">
  <div class="flex justify-between items-center">
    <a href="check-in-history.html" class="flex-col items-center gap-1 text-gray-400">
      <img src="material-symbols_book-outline (6).png" class="w-6 h-6">
      <span class="text-xs">History</span>
    </a>
    <a href="alerts.html" class="flex-col items-center gap-1 text-[#E8622A]">
   <img src="material-symbols_book-outline (7).png" class="w-6 h-6">
      <span class="text-xs font-medium">Alerts</span>
    </a>
    <a href="scanner.html" class="flex-col items-center gap-1 text-gray-400">
      <img src="Home (1).png" class="w-10 h-10">
    </a>
    <a href="help.html" class="flex-col items-center gap-1 text-gray-400">
      <img src="material-symbols_book-outline (3).png" class="w-6 h-6">
      <span class="text-xs">Help</span>
    </a>
    <a href="staff-profile.html" class="flex-col items-center gap-1 text-gray-400">
      <img src="material-symbols_book-outline (5).png" class="w-6 h-6">
      <span class="text-xs">Profile</span>
    </a>
  </div>
</nav>
</div>
</body>
</html>
