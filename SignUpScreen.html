<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex justify-center">
  <div class="w-full max-w-sm px-6 py-8 flex-col min-h-screen">
    <div class="mb-6">
      <h1 class="font-bold text-3xl leading-tight">
        Join the <span class="text-[#E8622A]">Energy</span>
      </h1>
      <p class="mt-3 text-base leading-relaxed">
        Create an account to discover upcoming festivals, conferences, and workshops tailored for you.
      </p>
    </div>


    <form id="signupForm" class="space-y-5">
      <div>
        <label for="fullName" class="font-semibold mb-2 block text-xl">Full Name</label>
        <input type="text" id="fullName" name="user_name" placeholder="Enter your full name" required class="w-full border-gray-300 rounded-lg px-4 py-3 border"/>
      </div>
      
      <div>
        <label for="userEmail" class="font-semibold mb-2 block text-xl">Email Address</label>
        <div class="relative">
          <input type="email" id="userEmail" name="user_email" placeholder="name@gmail.com" required class="w-full border-gray-300 rounded-lg px-8 py-3 border"/>
          <svg class="absolute left-2 top-4 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
          </svg>
        </div>
      </div>
      
      <div>
        <label for="userPassword" class="font-semibold mb-2 mt-2 block text-xl">Password</label>
        <div class="relative">
          <svg class="absolute left-2 top-3 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
          <input type="password" id="userPassword" name="user_password" placeholder="*********" required class="w-full border-gray-300 rounded-lg px-8 py-3 border"/>
        </div>
      </div>

      <div class="flex justify-between items-center text-sm mt-3 mb-5">
        <label class="flex items-center gap-2 text-gray-600">
          <input type="checkbox" id="rememberMe" name="remember_me" value="true" class="rounded border-gray-300 w-4 h-4"/>
          <span>Remember me</span>
        </label>
        <a href="forgotpassword.html" class="text-blue-600 font-medium">Forgot Password?</a>
      </div>

    
      <button type="submit" id="createBtn" class="font-semibold text-white bg-[#E8622A] rounded-lg w-full py-2.5">
        Create Account
      </button>
    </form>

    <div class="flex items-center gap-4 my-6">
      <div class="flex-1 h-px bg-[#E8622A]"></div>
      <span class="text-sm text-gray-500">or continue with</span>
      <div class="flex-1 h-px bg-[#E8622A]"></div>
    </div>

    <div class="grid grid-cols-2 gap-3">
      <button class="border border-gray-300 rounded-md py-3 flex items-center justify-center gap-2">
        <img src="logos_google-icon.png" alt="">
        <h1>Google</h1>
      </button>
      <button class="border border-gray-300 rounded-md py-3 flex items-center justify-center gap-2">
        <img src="f7_logo-apple.png" alt="">
        <h1>Apple</h1>
      </button>
    </div>

    <div class="mt-6 text-center">
      <p class="text-sm text-gray-500">
        Already have an account? 
        <a href="LoginFilled.html" class="text-[#E8622A] font-medium">Log in</a>
      </p>
      <p class="text-xs text-gray-400 mt-3 leading-relaxed">
        By creating an account you agree to ScanPass' 
        <a href="#" class="text-[#E8622A]">Terms of Service</a> and 
        <a href="#" class="text-[#E8622A]">Privacy Policy</a>
      </p>
    </div>
  </div>


  <script>
  document.getElementById('signupForm').onsubmit = (e) => {
    e.preventDefault(); 
    
  
    const userData = {
      name: document.getElementById('fullName').value,
      email: document.getElementById('userEmail').value,
      password: document.getElementById('userPassword').value
    };
    localStorage.setItem('tempUser', JSON.stringify(userData));
    
    window.location.href = 'Attendeeonboarding.html?from=signup';
  }
  </script>
</body>
</html>
