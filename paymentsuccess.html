<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Order Confirmed - ScanPass</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<main class="w-full max-w-[390px] flex mx-auto min-h-screen pt-12 px-5 pb-8 flex-col">

<!-- 1. Header / Back -->
<header class="mb-12">
  <a href="paymetscreen.html" class="inline-flex" aria-label="Go back">
    <img src="material-symbols_arrow-back.png" class="w-6 h-6">
  </a>
</header>

<!-- 2. Success Content - Centered -->
<section class="flex-1 flex-col items-center text-center">

  <!-- Success Icon -->
  <div class="relative mb-6 ml-20">
    <div class="w-28 h-28 bg-green-100 rounded-full flex items-center justify-center">
      <div class="w-24 h-24 bg-green-500 rounded-full flex items-center justify-center">
        <img src="zondicons_checkmark.png" class="w-14 h-14">
      </div>
    </div>
  </div>

  <!-- Title -->
  <h1 class="text-2xl font-bold flex items-center text-black mb-3">
    Your Order is Confirmed.
  </h1>

  <!-- Subtitle -->
  <p class=" font-semibold leading-6 mb-2 max-w-[280px]">
    Your registration was completed successfully.
  </p>

  <!-- Description -->
  <p class="font-semibold leading-6 max-w-[280px] mb-12">
    Get ready for an amazing event experience. Your digital ticket is now available.
  </p>
</section>

<!-- 3. Actions - Bottom -->
<section class="space-y-3">
  <a
    href="qrscreen.html"
    class="p-32 block w-full bg-[#E8622A] hover:bg-[#D4551F] active:bg-[#C24D1C] text-white font-semibold py-4 rounded-xl text-base text-center transition-colors"
  >
    View Ticket
  </a>

  <a
    href="eventdiscovery.html"
    class="block w-full border border-[#E8622A] text-[#E8622A] hover:bg-[#E8622A]/5 font-semibold py-4 rounded-xl text-base text-center transition-colors"
  >
    Back to Home
  </a>
</section>
</main>
</body>
</html>
