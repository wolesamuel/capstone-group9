<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
		<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex min-h-screen justify-center items-center">
  <div class="w-full items-center max-w-sm px-6 py-8 flex-col min-h-screen">
	<div class="mb-6">
  <h1 class="text-3xl font-bold text-black leading-tight w-[20rem]">
    Set up your <span class="text-[#E8622A]">ScanPass</span> Experience
  </h1>
  <p class="mt-3 text-base w-[19rem]">
    We'll streamline your setup experience accordingly.
  </p>
</div>
	<div class="flex-1 flex-col space-y-4">
		<button id="attendeeOption" class="option-card w-full border-[#E8622A] rounded-md p-4 flex items-center gap-4 border">
				<nav class="">
				<img src="game-icons_ticket.png" class="w-24">
				</nav>
			<aside class="text-left">
				<h1 class="font-bold text-2xl">
				Attend an Event
			</h1>
			<p class="text-xs font mt-1">
				Receive your QR ticket, access events seamlessly, and get verified instantly at entry.
			</p>
			</aside>
			<nav>
				<img src="mdi_arrow-up.png" alt="" class="w-24">
			</nav>
			</button>

			<button id="staffOption" class="option-card w-full border-[#E8622A] rounded-md p-4 flex items-center gap-4 border mt-10">
				<nav class="">
				<img src="game-icons_ticket.png" class="w-24">
				</nav>
			<aside class="text-left">
				<h1 class="font-bold text-2xl">
				Staff Access
			</h1>
			<p class="text-xs font mt-1">
				Scan tickets, validate entries and manage attendee check-ins efficiently.
			</p>
			</aside>
			<nav>
				<img src="mdi_arrow-up.png" alt="" class="w-24">
			</nav>
			</button>
		</div>
		 <div class="mt-6 space-y-3 w-full max-w-sm mx-auto">
		<a href="SignUpScreen.html">
		<button class="mt-40 w-full bg-[#E8622A] text-white font-semibold py-4 rounded-md transition">
		Continue
		</button>
		</a>
		<p class="mt-2 text-center">
			Already have an account? <a href="LoginFilled.html" class="text-[#E8622A] font-medium">Log in</a>
		</p>
		</div>
	</div>



	<script>
document.addEventListener('DOMContentLoaded', () => {
  const options = document.querySelectorAll('.option-card');
  const continueBtn = document.getElementById('continueBtn');
  let selectedRole = null;

  options.forEach(option => {
    option.onclick = () => {

      options.forEach(o => o.classList.remove('border-orange-500', 'bg-orange-50'));
      

      option.classList.add('border-orange-500', 'bg-orange-50');
      

      selectedRole = option.id === 'attendeeOption' ? 'attendee' : 'staff';
      

      continueBtn.disabled = false;
      continueBtn.classList.remove('opacity-50', 'cursor-not-allowed');
      continueBtn.classList.add('bg-orange-500', 'hover:bg-orange-600');
    }
  });

  continueBtn.onclick = () => {
    if(selectedRole) {
      window.location.href = `/signup?role=${selectedRole}`;
    }
  }
});
</script>
</body>
</html>
