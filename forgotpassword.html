<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex justify-center font-sans">
  <div class="w-full max-w-sm px-6 py-8 flex-col min-h-screen">
    <!-- Icon -->
    <div class="flex justify-center mb-6">
      <div class="relative">
        <img src="material-symbols-light_mail-lock-rounded.png">
        <img src="flowbite_lock-open-solid.png" class="w-5 h-5 text-[#E8622A] absolute -bottom-2 left-1/2 -translate-x-1/2">
      </div>
    </div>

    <div class="mb-6">
      <h1 class="text-xl font-bold mb-2">Forgot Password?</h1>
      <p class="leading-relaxed">
        No worries! Enter your email address and we'll send you a link to reset your password.
      </p>
    </div>

   
    <div class="space-y-5">
      <div>
        <label class="block text-xl font-semibold mb-2">Email Address</label>
        <div class="relative">
          <svg class="absolute left-3 top-3.5 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
          </svg>
          <input type="email" id="email" placeholder="Enter your email" 
            class="w-full border border-gray-300 rounded-lg pl-10 pr-4 py-2">
        </div>
      </div>

      <button id="resetBtn" type="button" class="w-full bg-[#E8622A] text-white font-semibold py-4 mt-4 rounded-xl">
        Set Reset Link
      </button>
    </div>

    <div class="flex items-center gap-4 my-6">
      <div class="flex-1 h-px bg-gray-200"></div>
      <span class="text-sm text-gray-500">OR</span>
      <div class="flex-1 h-px bg-gray-200"></div>
    </div>

    <a href="LoginFilled.html">
    <button class="w-full border border-[#E8622A] text-[#E8622A] font-semibold py-2 rounded-xl flex items-center justify-center gap-2 hover:bg-orange-50 transition">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      Back to Sign In
    </button>
    </a>
    
    <div class="mt-8 text-center space-y-2">
      <p class="text-sm font-semibold">
      <span class="font-semibold text-black block mb-1">Can't find the email?</span>
      <span class="text-sm text-gray-600">Check your spam or promotions folder, or make sure you entered your correct email.</span>
      </p>
      <p class="text-sm text-gray-600">
        Need help? <a href="#" class="text-[#E8622A] font-medium">Contact Support</a>
      </p>
    </div>
  </div>

  <!-- JS to navigate and keep role -->
  <script>
  document.getElementById('resetBtn').onclick = () => {
    const role = new URLSearchParams(window.location.search).get('role') || 'attendee';

    window.location.href = `verify.html?role=${role}`;
  }
  </script>
</body>
</html>
