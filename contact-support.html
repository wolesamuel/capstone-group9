<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Contact Support - ScanPass</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="antialiased">
<div class="w-full max-w-[390px] mx-auto min-h-screen pb-8">

<!-- Header -->
<header class="pt-11 px-5 h-14 flex items-center justify-center relative">
	<a href="profile.html" class="absolute left-5 w-8 h-8 flex items-center justify-center -ml-2 active:bg-gray-100 rounded-full transition" aria-label="Back">
		<img src="material-symbols_arrow-back.png" class="w-6 h-6">
	</a>
	<h1 class="text-lg font-bold text-black tracking-tight">Contact Support</h1>
</header>

<!-- Content -->
<section class="px-5 mt-4 space-y-5">

	<!-- Alert Banner -->
	<div class="bg-orange-50 border-orange-100 rounded-xl p-3.5 flex gap-3">
		<img src="bxs_error.png" class="w-8 h-9 text-[#E8622A] flex-shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 20 20">

		<div>
			<p class="text-sm font-semibold text-black">Having trouble with your ticket?</p>
			<p class="text-sm text-gray-600">Our support team can help resolve that.</p>
		</div>
	</div>

	<!-- Form -->
	<form class="space-y-5" onsubmit="event.preventDefault()">

		<!-- Issue Type -->
		<div>
			<label for="issue-type" class="block text-sm font-medium mb-2">Issue type</label>
			<input
				type="text"
				id="issue-type"
				class="w-full h-12 px-4 border-gray-300 rounded-xl text- text-black placeholder-gray-400 border focus:outline-none focus:border-[#E8622A] focus:ring-1 focus:ring-[#E8622A] transition"
			>
		</div>

		<!-- Subject -->
		<div>
			<label for="subject" class="block text-sm font-medium text-black mb-2">Subject</label>
			<input
				type="text"
				id="subject"
				class="w-full h-12 px-4 border t border-gray-300 rounded-xl text- text-black placeholder-gray-400 focus:outline-none focus:border-[#E8622A] focus:ring-1 focus:ring-[#E8622A] transition"
				placeholder=""
			>
		</div>

		<!-- Describe the issue -->
		<div>
			<label for="description" class="block text-sm font-medium text-black mb-2">Describe the issue</label>
			<div class="relative border rounded-xl">
				<textarea
					id="description"
					rows="4"
					maxlength="200"
					oninput="document.getElementById('char-count').textContent = this.value.length + '/200'"
					class="w-full px-4 py-3 border-gray-300 rounded-xl text- text-black placeholder-gray-400 focus:outline-none focus:border-[#E8622A] focus:ring-1 focus:ring-[#E8622A] resize-none transition"
					placeholder=""
				></textarea>
				<span id="char-count" class="absolute bottom-3 right-4 text-xs text-gray-400">0/200</span>
			</div>
		</div>

	</form>

	<!-- Buttons -->
	<div class="space-y-3 pt-2">
		<!-- Send Support Request -->
		<button
			type="submit"
			class="w-full h-12 bg-[#E8622A] rounded-xl flex items-center justify-center gap-2 text-white font-semibold text- active:scale- active:bg-[#D95A24] transition"
		>
			<img src="tabler_send.png" class="w-5 h-5">
			Send Support Request
		</button>

		<!-- Call Event Support -->
		<button
			type="button"
			class="w-full h-12 bg-white border-2 border-[#E8622A] rounded-xl flex items-center justify-center gap-2 text-[#E8622A] font-semibold text- active:bg-orange-50 transition"
		>
			<img src="ic_baseline-phone.png" class="w-5 h-5">
			Call Event Support
		</button>
	</div>

</section>

</div>
</body>
</html>
